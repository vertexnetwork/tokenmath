name: Broken links

# Weekly link check via lychee. Catches stale vendor URLs in MDX content + dead JSON-LD
# sameAs entries before they hurt SEO. Runs on the deployed prod URL so we test what
# users actually see.

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --max-retries 2
            --timeout 30
            --accept 200,206,301,302,308,403,429
            https://tokenmath.dev
            https://tokenmath.dev/models
            https://tokenmath.dev/pricing-data
            https://tokenmath.dev/about
            https://tokenmath.dev/changelog
            https://tokenmath.dev/network
          fail: false
          format: markdown
          output: ./lychee-report.md

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "broken links detected"
          content-filepath: ./lychee-report.md
          labels: "bug, automated"
